<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        --green: #2d9e5f; --yellow-green: #7db63a; --yellow: #e6b800;
        --orange: #e07b2a; --red: #d64045; --muted: #6b7280; --border: #e4e7ec;
      }
      body { width: 320px; margin: 0; font-family: -apple-system, system-ui, sans-serif; color: #1a1d23; }
      header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 700; }
      .body { padding: 16px; }
      .muted { color: var(--muted); font-size: 0.85rem; }
      .grade-row { display: flex; align-items: center; gap: 12px; }
      .grade { width: 46px; height: 46px; border-radius: 50%; color: #fff; display: flex;
               align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; }
      .grade.green { background: var(--green); } .grade.yellow-green { background: var(--yellow-green); }
      .grade.yellow { background: var(--yellow); } .grade.orange { background: var(--orange); }
      .grade.red { background: var(--red); }
      .score { font-size: 1.1rem; font-weight: 600; }
      .title { font-size: 0.9rem; margin: 10px 0 6px; }
      .criteria { list-style: none; padding: 0; margin: 10px 0 0; font-size: 0.8rem; }
      .criteria li { display: flex; justify-content: space-between; padding: 3px 0; border-top: 1px solid var(--border); }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-left: 6px; }
      .dot.green { background: var(--green); } .dot.yellow-green { background: var(--yellow-green); }
      .dot.yellow { background: var(--yellow); } .dot.orange { background: var(--orange); } .dot.red { background: var(--red); }
      .dot.gray { background: var(--muted); }
      a.btn { display: inline-block; margin-top: 12px; font-size: 0.85rem; color: var(--green); text-decoration: none; }
      .retracted { color: var(--red); font-weight: 700; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <header>SciCheck</header>
    <div class="body" id="content"><p class="muted">Detecting article…</p></div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
