# SQLite in development/test (zero-setup, local file), PostgreSQL in production
# (Neon — durable; set DATABASE_URL in the Render dashboard).
default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: sqlite3
  database: storage/development.sqlite3
  timeout: 5000

test:
  <<: *default
  adapter: sqlite3
  database: storage/test.sqlite3
  timeout: 5000

production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
