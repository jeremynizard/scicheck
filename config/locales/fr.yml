        l4: "Niveau de preuve élevé. La randomisation ou une synthèse formelle des preuves limite les biais."
        l3: "Niveau de preuve modéré. Informatif mais sujet aux biais de sélection/confusion."
        l2: "Niveau de preuve limité. Les conclusions devraient être confirmées par des schémas d'étude plus solides."
        l1: "Niveau de preuve faible. Ne généralisez pas à partir de cette seule observation ou opinion."
        l0: "Attention : cet article n'a pas été évalué par les pairs."
