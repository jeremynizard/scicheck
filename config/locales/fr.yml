fr:
  language_name: "Français"
  app:
    name: "SciCheck"
    tagline: "Évaluez la qualité d'un article scientifique"
  flash:
    invalid_doi: "Impossible de trouver un DOI pour cette saisie. Colle directement le DOI (p. ex. 10.1038/s41392-020-0207-x) ou un lien doi.org."
    not_found: "DOI introuvable : %{doi}. Vérifiez-le et réessayez."
    invalid_link: "Lien d'analyse invalide."
    expired: "Cette analyse n'est plus disponible."
  pending:
    title: "Analyse en cours…"
    detail: "Interrogation de Crossref, OpenAlex, PubMed et PubPeer."
    noscript: "Cette page se rafraîchit automatiquement. Veuillez patienter."
  home:
    heading: "Évaluez la qualité d'un article scientifique"
    intro: "Saisissez un DOI pour obtenir une analyse indépendante fondée sur des critères méthodologiques objectifs."
    placeholder: "p. ex. 10.1097/MS9.0000000000003127"
    analyze: "Analyser"
    hint: "Colle un DOI, un lien doi.org, ou l'URL d'un article (certains sites payants exigent le DOI)"
    loading_title: "Analyse en cours..."
    loading_detail: "Interrogation des bases OpenAlex et Crossref"
    what_we_analyze: "Ce que nous analysons"
    source: "Source"
    how_it_works: "Fonctionnement"
    weight: "Poids"
    weight_of_global: "%{pct} % du score global"
    cards:
      study_type:
        title: "Type d'étude"
        blurb: "Position dans la pyramide des preuves (EBM)"
        source: "Types de publication PubMed (MeSH), avec repli OpenAlex / Crossref"
        how_html: "Lit le <em>schéma</em> de l'étude depuis les types de publication MeSH de PubMed — qui (contrairement à une étiquette générique « article ») distinguent une revue systématique ou une méta-analyse d'une revue narrative, et un ECR d'une étude de cas — puis le place sur la pyramide des preuves (médecine fondée sur les preuves). Noté de 0 (preprint) à 5 (méta-analyse / revue systématique)."
      review_pedigree:
        title: "Réputation de la revue"
        blurb: "Indexée dans PubMed, Scopus, DOAJ"
        source: "Métadonnées de la source OpenAlex (is_core, is_in_doaj, indexed_in)"
        how: "Vérifie si la revue est indexée dans les grandes bases. Indexée à la fois dans PubMed et Scopus = score maximal. DOAJ seulement = crédibilité limitée. Absente de toute base majeure = réputation invérifiable, à interpréter avec prudence."
      review_process:
        title: "Rigueur de la relecture"
        blurb: "Contrôle de la durée de relecture par les pairs"
        source_html: "Dates d'assertion Crossref, avec repli sur les dates d'historique PubMed (reçu &rarr; accepté)"
        how: "Mesure le délai entre soumission et acceptation. Moins de 3 semaines est un signal d'alerte (relecture expéditive). 60 à 180 jours est la plage normale d'une relecture sérieuse. Marqué N/D quand aucun éditeur ne fournit ces dates."
      open_science:
        title: "Transparence"
        blurb: "Signaux de partage des données et du code"
        source: "Banques de données enregistrées PubMed & déclaration de conflits d'intérêts, plus le texte du résumé (Crossref / OpenAlex)"
        how_html: "Combine des signaux structurés — banques de données enregistrées (ClinicalTrials.gov, GEO, Dryad&hellip;) et déclaration de conflits d'intérêts — avec les mentions de dépôts de données (GitHub, Zenodo, OSF, Figshare&hellip;) dans le résumé. Deux signaux ou plus = forte transparence."
      pubpeer:
        title: "Signalements PubPeer"
        blurb: "Contrôle d'intégrité post-publication"
        source: "API PubPeer"
        how: "Vérifie si l'article a été commenté sur PubPeer par des chercheurs (p. ex. doutes sur des images ou des statistiques). Les commentaires ne sont pas toujours négatifs, donc le plafond est gradué : 1 à 2 commentaires plafonnent le score à 74, 3 et plus à 59. Lisez les commentaires avant de juger."
        weight_html: "10 % du score global (+ plafond gradué si signalé)"
      citation_profile:
        title: "Profil de citations"
        blurb: "Impact de citation normalisé par domaine"
        source: "OpenAlex cited_by_percentile_year"
        how_html: "Utilise un percentile (0–99) normalisé par domaine et année de publication. Top 25 % = vert, 50–74 = jaune, 25–49 = orange, sous 25 = rouge. Les articles de moins d'un an sont marqués N/D."
      retracted_references:
        title: "Références rétractées"
        blurb: "Contrôle de rétractation des sources citées"
        source_html: "DOI des références Crossref &rarr; filtre is_retracted d'OpenAlex"
        how: "Extrait tous les DOI cités de la liste des références, puis interroge OpenAlex par lots pour vérifier d'éventuelles rétractations. Zéro rétractée = vert. Une = orange. Deux ou plus = rouge."
      author_track_record:
        title: "Parcours des auteurs"
        blurb: "Indice h & affiliations"
        source: "API Auteurs d'OpenAlex (jusqu'à 5 auteurs)"
        how_html: "Récupère l'indice h, le nombre de publications et les affiliations institutionnelles de chaque auteur. Au moins un auteur avec un indice h ≥ 20 et une affiliation = score maximal. Tous les auteurs sous l'indice h 3 = rouge."
  results:
    retracted_banner_html: "⚠ Cet article a été <strong>RÉTRACTÉ</strong>. Ses conclusions ne doivent pas servir de référence."
    retracted_reason: "Raison : %{reason}."
    closed_access: "Accès fermé"
    access_badge: "Accès %{status}"
    criteria_breakdown: "Détail des critères"
    coverage_html: "Score calculé à partir de <strong>%{counted} critères sur %{total}</strong> (%{pct} % du poids total)."
    coverage_unavailable: "Non disponibles : %{list}."
    score_capped_pubpeer: "Score plafonné en raison de commentaires post-publication sur PubPeer."
    source_label: "Source : %{source}"
    view_on_pubpeer: "Voir les commentaires sur PubPeer"
    abstract: "Résumé"
    analyze_another: "Analyser un autre article"
    na: "N/D"
    ai:
